<!doctype html><html lang='en'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>ASCEND | Roblox Revenue Leak Scorecard</title><style>:root{--bg:#05070a;--p:#0c1118;--p2:#101721;--l:rgba(255,255,255,.12);--t:#f7fbff;--m:#a9b8c9;--d:#728195;--b:#20c8ff;--b2:#00a3ff;--g:#7ddc9d;--a:#ffd166;--o:#ffb86b;--r:#ff7b9b}*{box-sizing:border-box}body{min-height:100vh;margin:0;background:linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.035) 1px,transparent 1px),linear-gradient(180deg,rgba(0,163,255,.08),transparent 360px),var(--bg);background-size:44px 44px,44px 44px,auto,auto;color:var(--t);font-family:Arial,Helvetica,sans-serif}button,input{font:inherit}button:focus-visible,input:focus-visible,a:focus-visible{outline:2px solid var(--b);outline-offset:3px}.shell{width:min(100% - 32px,1200px);margin:auto}header{display:flex;min-height:64px;align-items:center;justify-content:space-between;gap:24px;border-bottom:1px solid var(--l)}.brand{border:0;background:transparent;color:var(--t);cursor:pointer;font-weight:900;letter-spacing:.24em}.promise{color:var(--m);font-size:14px}.home{display:grid;min-height:calc(100vh - 64px);grid-template-columns:1.05fr .95fr;gap:40px;align-items:center;padding:48px 0}.ey{display:inline-flex;border:1px solid rgba(32,200,255,.34);border-radius:999px;background:rgba(0,163,255,.1);color:var(--b);padding:7px 11px;font-size:12px;font-weight:900;letter-spacing:.18em;text-transform:uppercase}.sl{color:var(--b);font-size:12px;font-weight:900;letter-spacing:.22em;text-transform:uppercase}h1{margin:24px 0 0;font-size:clamp(42px,6vw,76px);line-height:1.02}h2{margin:10px 0 0;font-size:clamp(26px,4vw,46px);line-height:1.08}h3{margin:0;font-size:20px}p{line-height:1.65}.lead{max-width:720px;margin:28px 0 0;color:#d8e5f3;font-size:18px}.actions{display:flex;flex-wrap:wrap;gap:12px;margin-top:28px}.btn{display:inline-flex;min-height:48px;align-items:center;justify-content:center;gap:10px;border:1px solid var(--l);border-radius:6px;padding:12px 18px;background:rgba(255,255,255,.04);color:var(--t);cursor:pointer;font-weight:900;text-decoration:none}.btn:hover{border-color:rgba(255,255,255,.28);background:rgba(255,255,255,.07)}.btn.pri{border-color:var(--b2);background:var(--b2);color:#031018}.panel{border:1px solid var(--l);border-radius:8px;background:rgba(12,17,24,.94);box-shadow:0 0 0 1px rgba(32,200,255,.12),0 24px 80px rgba(0,120,255,.12)}.map{padding:28px}.maphead{display:flex;align-items:start;justify-content:space-between;gap:16px}.sig{border:1px solid var(--l);border-radius:6px;background:rgba(255,255,255,.04);padding:10px 12px;color:#e8f3ff;font-size:14px}.maplist{display:grid;gap:12px;margin-top:22px}.mi{display:grid;grid-template-columns:42px 1fr;gap:14px;border:1px solid var(--l);border-radius:6px;background:rgba(255,255,255,.035);padding:16px}.num{display:grid;width:40px;height:40px;place-items:center;border:1px solid rgba(32,200,255,.38);border-radius:6px;background:rgba(0,163,255,.1);color:var(--b);font-weight:900}.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:28px}.card{border:1px solid var(--l);border-radius:6px;background:rgba(255,255,255,.035);padding:18px;color:#e7f2ff;font-size:14px}.app{padding:34px 0 48px}.ptop{display:flex;align-items:end;justify-content:space-between;gap:16px}.bar{height:8px;margin-top:14px;overflow:hidden;border-radius:999px;background:rgba(255,255,255,.1)}.bar span{display:block;height:100%;border-radius:inherit;background:var(--b)}.qbox{padding:28px}.alist{display:grid;gap:12px;margin-top:24px}.ans{display:flex;min-height:64px;width:100%;align-items:center;gap:14px;border:1px solid var(--l);border-radius:6px;background:rgba(255,255,255,.035);color:#dbe8f5;cursor:pointer;padding:12px 14px;text-align:left}.ans.sel{border-color:var(--b);background:rgba(0,163,255,.13);color:var(--t)}.as{display:grid;width:36px;height:36px;flex:0 0 auto;place-items:center;border:1px solid var(--l);border-radius:6px;background:#080d13;font-weight:900}.ans.sel .as{border-color:var(--b);background:var(--b2);color:#031018}.nav{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:26px}.email{display:grid;min-height:calc(100vh - 64px);place-items:center;padding:40px 0}form{max-width:680px;padding:32px}label{display:block;margin-top:22px;color:#e8f3ff;font-weight:900}input{width:100%;min-height:50px;margin-top:8px;border:1px solid var(--l);border-radius:6px;background:#070b10;color:var(--t);padding:12px 14px}.err{color:var(--r);font-size:14px}.hide{display:none!important}.res{display:grid;gap:24px;padding:28px 0 48px}.rh{display:grid;grid-template-columns:auto 1fr;gap:28px;align-items:center;padding:30px}.ring{display:grid;width:190px;height:190px;place-items:center;border-radius:50%;background:conic-gradient(var(--b) calc(var(--score)*1%),rgba(255,255,255,.08) 0),#070b10}.rin{display:grid;width:calc(100% - 2px);height:calc(100% - 2px);place-items:center;border-radius:inherit;background:#070b10;text-align:center}.sn{font-size:48px;font-weight:900}.two{display:grid;grid-template-columns:.9fr 1.1fr;gap:18px}.pad{padding:22px}.wi,.next{border:1px solid var(--l);border-radius:6px;background:rgba(255,255,255,.035);padding:16px}.cg{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}.cat{padding:20px}.cat.weak{border-color:rgba(32,200,255,.46)}.ch{display:flex;align-items:start;justify-content:space-between;gap:14px}.ms{display:grid;width:78px;height:78px;flex:0 0 auto;place-items:center;border-radius:50%;background:conic-gradient(var(--b) calc(var(--score)*1%),rgba(255,255,255,.08) 0),#070b10;font-weight:900;text-align:center}.ms span{display:block;color:var(--d);font-size:10px;letter-spacing:.12em}.st{display:inline-flex;margin-top:12px;border:1px solid var(--l);border-radius:999px;padding:5px 9px;font-size:12px;font-weight:900}.severe{color:var(--r);border-color:rgba(255,123,155,.36)}.active{color:var(--o);border-color:rgba(255,184,107,.36)}.moderate{color:var(--a);border-color:rgba(255,209,102,.36)}.minor{color:var(--g);border-color:rgba(125,220,157,.36)}.strong{color:var(--b);border-color:rgba(32,200,255,.36)}.cta{display:grid;grid-template-columns:1fr auto;gap:24px;align-items:center;border-color:rgba(32,200,255,.32);background:rgba(0,163,255,.1);padding:28px}.disc{color:var(--d);font-size:13px;text-align:center}@media(max-width:860px){.shell{width:min(100% - 28px,1200px)}.promise{display:none}.home,.two,.rh,.cta{grid-template-columns:1fr}.cards,.cg{grid-template-columns:1fr}.ring{width:160px;height:160px}.actions .btn,.cta .btn{width:100%}}@media print{body{background:#fff;color:#111827}.no{display:none!important}.panel{border-color:#d1d5db;background:#fff;box-shadow:none}}</style></head><body><div class='shell'><header class='no'><button class='brand' type='button' data-home>ASCEND</button><div class='promise'>Increase the value of every player before you spend more to acquire the next one.</div></header><main id='app'></main></div><script>const AO=[[0,'Not in place'],[1,'Weak / unclear'],[2,'Partially in place'],[3,'Mostly in place'],[4,'Strong / consistently measured']],C=[['acquisition','Acquisition Leak','Acquisition','The studio is bringing in players before confirming whether those sources produce retained, monetising users.','You may be judging acquisition by volume instead of downstream value. More visits do not automatically mean more retained spenders.','Compare each source by D1 retention, payer conversion, revenue per user, and payback before scaling.'],['activation','Activation Leak','Activation','Players arrive but fail to understand the loop, feel progress, or reach the first meaningful engagement moment quickly enough.','Players may be entering the game before the value loop becomes clear. If the first session fails, monetisation never gets a fair chance.','Map the first 60 seconds and identify where players stall, leave, or fail to understand the next action.'],['monetisation','Monetisation Leak','Monetisation','Players engage but too few convert, spend again, or understand the value of paid offers.','Your offers may exist, but the path from engagement to first purchase may not be clear, timely, or valuable enough.','Review first-purchase timing, store visibility, offer ladder structure, and pricing logic.'],['measurement','Measurement Leak','Measurement','The team has data, but not enough decision-ready instrumentation to know what to fix first.','You may have dashboards without a decision system. Data only helps if it tells the team what to fix next.','Build a KPI tree and experiment backlog tied to retention, payer conversion, ARPPU, ARPDAU, and payback.'],['compounding','Compounding Leak','Compounding','Growth work happens in fragments, so updates, ads, creators, monetisation, and analytics do not stack into a stronger revenue system.','Your team may be working hard in separate lanes, but the gains are not stacking into one revenue system.','Create a shared 30/60/90-day growth roadmap connecting live ops, monetisation, acquisition, and analytics.']].map(x=>({id:x[0],name:x[1],short:x[2],def:x[3],diag:x[4],act:x[5]})),Q=[[1,'acquisition','Do you know which acquisition sources bring your highest-value players, not just the cheapest visits?','Look for source quality: retained players, payer conversion, revenue per user, and payback.'],[2,'acquisition','Do you compare retention and payer behaviour by source/channel?','A channel that looks cheap can become expensive if D1/D7 retention or payer behaviour is weak.'],[3,'acquisition','Before increasing spend, do you know whether cold traffic can pay back?','Scale with payback, not guesswork. Cold traffic should be judged against cohort quality.'],[4,'activation','Can a new player understand what to do and why it matters within the first 60 seconds?','The first session should make the core loop, progress signal, and next action obvious.'],[5,'activation','Do you actively track or review where new players drop off in the first session?','Activation leaks often hide inside spawn flow, tutorial friction, unclear goals, or early confusion.'],[6,'activation','Have you tested onboarding, tutorial, spawn flow, or first-session clarity in the last 30-60 days?','Live-service games need repeated activation pressure tests as content and audiences change.'],[7,'monetisation','Is your first-purchase path obvious, well-timed, and connected to player motivation?','The first-purchase path should meet a real player desire without damaging retention.'],[8,'monetisation','Do your gamepasses, developer products, bundles, or event offers form a clear offer ladder?','A strong offer ladder gives different player segments sensible reasons to spend and spend again.'],[9,'monetisation','Have you reviewed pricing, packaging, or store flow based on payer conversion and ARPPU/ARPDAU data?','Retention-safe monetisation needs pricing and packaging decisions grounded in player value data.'],[10,'measurement','Do you have a KPI tree connecting acquisition, retention, monetisation, and revenue outcomes?','Decision-ready analytics connect the lifecycle instead of leaving each team with disconnected dashboards.'],[11,'measurement','Can your team quickly identify whether a revenue issue comes from traffic quality, onboarding, conversion, pricing, or retention?','A useful measurement layer tells the team what to fix first when revenue moves.'],[12,'measurement','Do you run experiments with clear hypotheses, success thresholds, and post-test readouts?','Experiments compound when the hypothesis, metric, threshold, and next action are defined before launch.'],[13,'compounding','Do updates and events have clear monetisation, retention, and reactivation goals before launch?','Live ops should be tied to player value, not just update volume or calendar pressure.'],[14,'compounding','Do acquisition, live ops, monetisation, and analytics decisions happen from one shared roadmap?','Lifecycle leaks compound when separate teams optimize in separate lanes.'],[15,'compounding','After each campaign, event, or update, do you document what improved, what failed, and what should be tested next?','The studio gets stronger when each campaign leaves behind learning, not just a result.']].map(x=>({id:x[0],cat:x[1],t:x[2],h:x[3]})),B=[[0,39,'Critical Revenue Leakage','Your game may be getting attention, but the player-value system is underbuilt. Scaling traffic harder right now would likely expose the same leaks faster. The priority is diagnosis: identify the biggest constraint before putting more weight on acquisition.'],[40,59,'Growth Is Leaking in Multiple Places','You likely have a working game, but growth is still fragmented. Some parts of the lifecycle may be performing, while others are suppressing retention, payer conversion, or payback. The next move is to rank the leaks by commercial impact and fix the highest-leverage constraint first.'],[60,74,'Promising but Not Yet Scale-Ready','Your studio has several of the right pieces in place, but the system may not be tight enough to scale confidently. Before increasing paid acquisition, creator campaigns, or update cadence, you should pressure-test source quality, first-purchase flow, and experiment discipline.'],[75,89,'Strong Foundation, Optimisation Opportunity','Your game likely has a solid operating base. The next upside is sharper prioritisation, better segmentation, stronger monetisation tests, and cleaner payback visibility. You may not need more tactics; you need a tighter growth operating system.'],[90,100,'Revenue System Is Mature','Your studio appears to have strong revenue operations already. The opportunity is likely advanced optimisation: payer segmentation, cohort-level acquisition strategy, event monetisation, and experiment velocity.']].map(x=>({min:x[0],max:x[1],title:x[2],msg:x[3]}));let S={v:'home',i:0,a:JSON.parse(localStorage.ascendAnswers||'{}'),e:localStorage.ascendEmail||'',u:localStorage.ascendUnlocked==='true'};const app=document.querySelector('#app'),done=()=>Q.every(q=>Number.isInteger(S.a[q.id])),save=()=>{localStorage.ascendAnswers=JSON.stringify(S.a);localStorage.ascendEmail=S.e;localStorage.ascendUnlocked=String(S.u)},st=p=>p<=39?['Severe leak','severe']:p<=59?['Active leak','active']:p<=74?['Moderate leak','moderate']:p<=89?['Minor leak','minor']:['Strong','strong'];function sum(){let raw=Q.reduce((n,q)=>n+(S.a[q.id]||0),0),pct=Math.round(raw/60*100),band=B.find(b=>pct>=b.min&&pct<=b.max),cats=C.map(c=>{let r=Q.filter(q=>q.cat===c.id).reduce((n,q)=>n+(S.a[q.id]||0),0),p=Math.round(r/12*100),x=st(p);return{...c,raw:r,pct:p,status:x[0],cls:x[1]}}),weak=[...cats].sort((a,b)=>a.pct-b.pct||a.raw-b.raw).slice(0,2);return{raw,pct,band,cats,weak}}function home(){app.innerHTML=`<section class='home'><div><span class='ey'>ASCEND diagnostic</span><h1>Roblox Revenue Leak Scorecard</h1><p class='lead'>Find where traffic without value capture is suppressing player value: acquisition quality, first-session clarity, payer conversion, measurement, and the growth work that should compound after every update.</p><div class='actions'><button class='btn pri' data-start>Start the scorecard -></button><a class='btn' href='#audit'>Book a Revenue Leak Audit</a></div><div class='cards'><div class='card'>D1/D7/D30, payer conversion, ARPPU, ARPDAU, payback.</div><div class='card'>Retention-safe monetisation and first-purchase path clarity.</div><div class='card'>A diagnosis-first read on what to fix first.</div></div></div><div class='panel map'><div class='maphead'><div><div class='sl'>Lifecycle leak map</div><h3>Player value system</h3></div><div class='sig'>15 signals</div></div><div class='maplist'>${C.map((c,i)=>`<div class='mi'><div class='num'>${i+1}</div><div><strong>${c.short}</strong><br><span style='color:var(--m)'>${c.def.split('.')[0]}</span></div></div>`).join('')}</div><p style='border-top:1px solid var(--l);margin-top:22px;padding-top:20px;color:#dce8f4'>Built for live Roblox studios with real traffic, real revenue, active updates, and budget to reinvest.</p></div></section>`}function question(){let q=Q[S.i],c=C.find(x=>x.id===q.cat),n=Q.filter(x=>Number.isInteger(S.a[x.id])).length,p=Math.round(n/Q.length*100);app.innerHTML=`<section class='app'><div class='ptop'><div><div class='sl'>Diagnostic progress</div><p style='margin:4px 0 0;color:var(--m)'>Question ${S.i+1} of ${Q.length}</p></div><strong>${p}% complete</strong></div><div class='bar'><span style='width:${p}%'></span></div><div class='panel qbox' style='margin-top:24px'><div class='sl'>${c.name}</div><h2>${q.t}</h2><p style='color:var(--m);max-width:780px'>${q.h}</p><div class='alist'>${AO.map(o=>`<button class='ans ${S.a[q.id]===o[0]?'sel':''}' data-answer='${o[0]}'><span class='as'>${o[0]}</span><strong>${o[1]}</strong></button>`).join('')}</div><div class='nav no'><button class='btn' data-back ${S.i===0?'disabled':''}>Back</button><button class='btn pri' data-next ${Number.isInteger(S.a[q.id])?'':'disabled'}>${S.i===Q.length-1?'Unlock results':'Next'} -></button></div></div></section>`}function email(){app.innerHTML=`<section class='email'><form class='panel' data-form><div class='sl'>Score ready</div><h2>Enter your email to unlock the full breakdown.</h2><p style='color:var(--m)'>The full result includes your revenue leak band, category breakdown, weakest lifecycle constraints, and recommended next move.</p><label for='email'>Work email</label><input id='email' type='email' placeholder='operator@studio.com' value='${S.e}'><p class='err hide' data-error>Enter a valid work email to unlock the full breakdown.</p><button class='btn pri' style='width:100%;margin-top:18px' type='submit'>Show full results</button></form></section>`}function results(){let x=sum(),w=new Set(x.weak.map(c=>c.id));app.innerHTML=`<section class='res'><div class='panel rh'><div class='ring' style='--score:${x.pct}'><div class='rin'><div><div class='sn'>${x.pct}%</div><div class='sl'>Score</div></div></div></div><div><div class='sl'>Roblox Revenue Leak Scorecard <span class='sig' style='margin-left:10px'>${x.raw}/60 raw score</span></div><h2>${x.band.title}</h2><p style='color:var(--m);font-size:17px'>${x.band.msg}</p><div class='actions no'><button class='btn' onclick='window.print()'>Print summary</button><button class='btn' data-restart>Restart</button></div></div></div><div class='two'><div class='panel pad'><div class='sl'>Top 2 weakest categories</div>${x.weak.map((c,i)=>`<div class='wi' style='margin-top:14px'><strong>${i+1}. ${c.name}</strong><span style='float:right;color:var(--b);font-weight:900'>${c.pct}%</span><p style='color:var(--m)'>${c.act}</p></div>`).join('')}</div><div class='panel pad'><div class='sl'>What this means</div><h3>Your next growth constraint is probably not another isolated tactic.</h3><p style='color:var(--m)'>Treat the lowest categories as lifecycle leaks that are limiting player value. If source quality, first-purchase path, retention-safe monetisation, and experiment discipline are not connected, more traffic can make the same revenue problem louder instead of more profitable.</p><div class='next'><strong>Recommended next move</strong><p style='color:var(--m)'>Run a Revenue Leak Audit around ${x.weak[0].short.toLowerCase()} and ${x.weak[1].short.toLowerCase()}, then turn the findings into a 30/60/90 roadmap for what to fix first.</p></div></div></div><div><div class='sl'>Category breakdown</div><h2>Lifecycle leak analysis</h2><div class='cg'>${x.cats.map(c=>`<article class='panel cat ${w.has(c.id)?'weak':''}'><div class='ch'><div><h3>${c.name} ${w.has(c.id)?'<span class=sig>Top constraint</span>':''}</h3><p style='color:var(--m)'>${c.def}</p></div><div class='ms' style='--score:${c.pct}'>${c.pct}%<span>Leak</span></div></div><span class='st ${c.cls}'>${c.status}</span><span style='margin-left:8px;color:var(--d);font-size:14px'>${c.raw}/12 category score</span><div class='bar'><span style='width:${c.pct}%'></span></div><p><strong>Diagnosis</strong><br><span style='color:var(--m)'>${c.diag}</span></p><p><strong>Recommended next action</strong><br><span style='color:var(--m)'>${c.act}</span></p></article>`).join('')}</div></div><div class='panel cta' id='audit'><div><div class='sl'>ASCEND Revenue Leak Audit</div><h2>Know your score. Now find the leak costing you the most revenue.</h2><p style='color:var(--m)'>The scorecard gives you the surface diagnosis. The Revenue Leak Audit maps the lifecycle properly: acquisition quality, first-session clarity, payer conversion, offer ladder, analytics, and the 30/60/90 roadmap for what to fix first.</p><p><strong>Built for live Roblox studios with real traffic, real revenue, and budget to reinvest.</strong></p></div><div class='actions no' style='margin:0'><a class='btn pri' href='mailto:hello@ascendops.com?subject=Revenue%20Leak%20Audit'>Book a Revenue Leak Audit</a><a class='btn' href='mailto:hello@ascendops.com?subject=30%2F60%2F90%20Revenue%20Roadmap'>Get the 30/60/90 Revenue Roadmap</a></div></div><p class='disc'>This scorecard is a diagnostic starting point, not a guarantee of results.</p></section>`}function render(){S.v==='home'?home():S.v==='questions'?question():S.v==='email'?email():results()}document.addEventListener('click',e=>{let t=e.target.closest('[data-start],[data-home],[data-answer],[data-back],[data-next],[data-restart]');if(!t)return;if(t.matches('[data-home]'))S.v='home';if(t.matches('[data-start]'))S.v=done()?(S.u?'results':'email'):'questions';if(t.matches('[data-answer]'))S.a[Q[S.i].id]=Number(t.dataset.answer);if(t.matches('[data-back]'))S.i=Math.max(0,S.i-1);if(t.matches('[data-next]')){if(S.i<Q.length-1)S.i++;else if(done())S.v=S.u?'results':'email'}if(t.matches('[data-restart]'))S={v:'home',i:0,a:{},e:'',u:false};save();render()});document.addEventListener('submit',e=>{if(!e.target.matches('[data-form]'))return;e.preventDefault();let v=document.querySelector('#email').value.trim();if(!v.includes('@')||!v.includes('.')){document.querySelector('[data-error]').classList.remove('hide');return}S.e=v;S.u=true;S.v='results';save();render()});render();</script></body></html>
